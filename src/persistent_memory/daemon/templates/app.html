<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>persistent-memory</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="icon" type="image/png" href="/static/pm/logo.png" />
<link rel="stylesheet" href="/static/pm/styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: #0a0d14; overflow: hidden; }
  #root, .pm-app { height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script>
  window.PM = {{ pm_json | safe }};
  window.PM_TOKEN = "{{ pm_token }}";
  window.PM_I18N = {{ pm_i18n_json | safe }};
  window.t = function(k, fallback) { return (window.PM_I18N && window.PM_I18N[k]) || fallback || k; };
  window.PM_API = {
    statusEndpoint: { accepted: "accept", reverted: "reject" },
    setStatus: function (id, uiStatus) {
      var action = this.statusEndpoint[uiStatus];
      if (!action) return Promise.resolve(false);
      return fetch("/api/records/" + encodeURIComponent(id) + "/" + action, {
        method: "POST",
        headers: { "X-PM-Token": window.PM_TOKEN },
      }).then(function (r) { return r.ok; }).catch(function () { return false; });
    },
    fetchSource: function (id) {
      return fetch("/api/records/" + encodeURIComponent(id) + "/source")
        .then(function (r) { return r.ok ? r.json() : { passages: [] }; })
        .catch(function () { return { passages: [] }; });
    },
    fetchRaw: function (id) {
      return fetch("/api/records/" + encodeURIComponent(id) + "/raw")
        .then(function (r) { return r.ok ? r.json() : null; })
        .catch(function () { return null; });
    },
    saveBody: function (id, body) {
      return fetch("/api/records/" + encodeURIComponent(id) + "/body", {
        method: "POST",
        headers: { "X-PM-Token": window.PM_TOKEN, "Content-Type": "application/json" },
        body: JSON.stringify({ body: body }),
      }).then(function (r) { return { ok: r.ok, status: r.status }; })
        .catch(function () { return { ok: false, status: 0 }; });
    },
    fetchSupersessionCandidates: function () {
      return fetch("/api/supersession-candidates")
        .then(function (r) { return r.ok ? r.json() : { candidates: [] }; })
        .catch(function () { return { candidates: [] }; });
    },
    dismissCandidate: function (payload) {
      return fetch("/api/supersession-candidates/dismiss", {
        method: "POST",
        headers: { "X-PM-Token": window.PM_TOKEN, "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      }).then(function (r) { return r.ok; }).catch(function () { return false; });
    },
    linkSupersession: function (oldId, newId) {
      return fetch("/api/records/" + encodeURIComponent(oldId) + "/supersede-by/" + encodeURIComponent(newId), {
        method: "POST",
        headers: { "X-PM-Token": window.PM_TOKEN },
      }).then(function (r) { return { ok: r.ok, status: r.status }; })
        .catch(function () { return { ok: false, status: 0 }; });
    },
  };
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="/static/pm/tweaks-panel.jsx"></script>
<script type="text/babel" src="/static/pm/components.jsx"></script>
<script type="text/babel" src="/static/pm/views-detail.jsx"></script>
<script type="text/babel" src="/static/pm/views-list.jsx"></script>
<script type="text/babel" src="/static/pm/views-dashboard.jsx"></script>
<script type="text/babel" src="/static/pm/views-projects.jsx"></script>
<script type="text/babel" src="/static/pm/views-graph.jsx"></script>
<script type="text/babel" src="/static/pm/views-misc.jsx"></script>
<script type="text/babel" src="/static/pm/views-candidates.jsx"></script>
<script type="text/babel" src="/static/pm/app.jsx"></script>

<script type="text/babel" data-presets="react">
  ReactDOM.createRoot(document.getElementById("root")).render(<window.PMApp />);
</script>
</body>
</html>
